<!DOCTYPE html>
<html lang="en">

<head>

<!-- =====================================================
TIMELINE DASHBOARD PAGE
---------------------------------------------------------
This page displays the drowsiness timeline chart.

Purpose:
• Visualize driver drowsiness levels over time
• Show the last 60 seconds of detection results
• Provide real-time updates from backend

Technologies Used:
• Chart.js (for graph visualization)
• Flask API (for timeline data)
===================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DrowsyGuard - Timeline</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- Chart.js Library -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

</head>


<body>


<!-- =====================================================
MAIN APPLICATION CONTAINER
===================================================== -->

    <div class="container">


 <!-- =====================================================
HEADER SECTION
Contains:
• Logo
• Navigation links
• Connection indicator
===================================================== -->

        <header class="header">


            <!-- Application logo -->

            <div class="logo">

                <span class="logo-icon">🚗</span>

                <h1 class="logo-text">

                    DrowsyGuard
                    <span class="accent">AI</span>

                </h1>

            </div>


            <!-- Navigation menu -->

            <nav class="navbar">

                <a href="/" class="nav-link">
                    Dashboard
                </a>

                <a href="/timeline.html" class="nav-link active">
                    Timeline
                </a>

            </nav>


            <!-- Connection status -->

            <div class="header-status">

                <div class="connection-indicator">

                    <span class="dot" id="connection-dot"></span>

                    <span class="connection-text">
                        Live
                    </span>

                </div>

            </div>

        </header>



<!-- =====================================================
TIMELINE CHART PANEL
Shows drowsiness levels for the last 60 seconds
===================================================== -->

        <div class="chart-panel card" style="margin-top:20px;">


            <div class="card-header">

                <h2 class="card-title">

                    <span class="icon">📉</span>

                    Drowsiness Timeline
                    <span style="font-weight:400;font-size:14px;">
                        (Last 60 seconds)
                    </span>

                </h2>

            </div>


            <!-- Chart container -->

            <div class="card-content">

                <canvas id="drowsiness-chart"></canvas>

            </div>

        </div>

    </div>



<!-- =====================================================
JAVASCRIPT FILES
---------------------------------------------------------
chart-config.js
• initializes Chart.js graph

main.js
• fetches timeline data from backend
• updates chart in real time
===================================================== -->

    <script src="js/chart-config.js"></script>

    <script src="js/main.js"></script>


</body>

</html>
